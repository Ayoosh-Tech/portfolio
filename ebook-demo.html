<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Beetroot Fried Rice eBook</title>

  <link rel="stylesheet" href="style.css" />

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f7fa;
    }

    .ebook-landing {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      background: linear-gradient(135deg, #eef2ff, #f8fafc);
    }

    .ebook-container {
      max-width: 1100px;
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: center;
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(12px);
      padding: 40px;
      border-radius: 20px;
    }

    .ebook-text h1 {
      font-size: 36px;
      margin-bottom: 15px;
      color: #333;
    }

    .ebook-tagline {
      color: #555;
      margin-bottom: 20px;
    }

    .ebook-benefits {
      list-style: none;
      padding: 0;
      margin-bottom: 25px;
    }

    .ebook-benefits li {
      margin-bottom: 10px;
      font-weight: 500;
    }

    .ebook-cta {
      background: #6a5acd;
      color: white;
      border: none;
      padding: 14px 28px;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s ease;
      font-size: 16px;
    }

    .ebook-cta:hover {
      transform: translateY(-2px);
      background: #5746d3;
    }

    .ebook-image img {
      width: 100%;
      max-width: 620px;
      display: block;
      margin: auto;
      border-radius: 8px;
    }

    .back-link {
      position: fixed;
      top: 20px;
      left: 20px;
      text-decoration: none;
      background: #6a5acd;
      color: white;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 14px;
    }

    @media (max-width: 768px) {
      .ebook-container {
        grid-template-columns: 1fr;
        text-align: center;
      }
    }

.checkout-box {
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(14px);
  padding: 30px;
  border-radius: 16px;
  width: 90%;
  max-width: 380px;
  text-align: center;
  position: relative;
  animation: popIn 0.3s ease;
}

@keyframes popIn {
  from {
    transform: scale(0.85);
    opacity: 0;
  }
  to {
    transform: scale(1);
    opacity: 1;
  }
}

.close-modal {
  position: absolute;
  top: 10px;
  right: 14px;
  font-size: 22px;
  cursor: pointer;
}

.checkout-box input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.pay-btn {
  width: 100%;
  padding: 14px;
  background: #6a5acd;
  color: white;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
}
.book-mockup {
  perspective: 1000px;
  display: flex;
  justify-content: center;
}

.book-mockup img {
  width: 260px;
  border-radius: 6px;
  transform: rotateY(-18deg) rotateX(4deg);
  box-shadow:
    -20px 20px 40px rgba(0,0,0,0.25),
    0 0 0 1px rgba(0,0,0,0.05);
  transition: 0.4s ease;
}

.book-mockup img:hover {
  transform: rotateY(-10deg) rotateX(2deg) scale(1.04);
}
  </style>
</head>

<body>

  <a href="index.html" class="back-link">← Back</a>

  <section class="ebook-landing">
    <div class="ebook-container">

      <div class="ebook-text">
        <h1>Beetroot Fried Rice eBook</h1>
        <p class="ebook-tagline">
          Discover the vibrant, healthy twist to your favorite fried rice.
        </p>

        <ul class="ebook-benefits">
          <li>✔ Easy step-by-step recipe</li>
          <li>✔ Healthy & colorful meals</li>
          <li>✔ Perfect for home cooks</li>
        </ul>

        <a href="https://ayooshtech.gumroad.com/l/beetrootebook"
   target="_blank"
   class="ebook-cta">
   Get the eBook
</a>
      </div>
     <!--  <div class="ebook-image">
        <img src="img/beetroot-ebook.png" alt="Beetroot Fried Rice eBook">

    </div> -->

  <div class="book-mockup">
    <img src="beetroot-ebook.png" alt="Beetroot Fried Rice eBook">
  </div>
</div>
    </div>
  </section>
